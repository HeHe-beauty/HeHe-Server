spring:
  application:
    name: hehe
  datasource:
    url: jdbc:mysql://localhost:3306/hehe_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis:
  type-aliases-package: org.dev.hehe
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html        # 접속 경로 단축
    tags-sorter: alpha             # 태그 알파벳 정렬
    operations-sorter: alpha       # 메서드 알파벳 정렬
  api-docs:
    path: /v3/api-docs

oauth:
  kakao:
    user-info-uri: https://kapi.kakao.com/v2/user/me
  naver:
    user-info-uri: https://openapi.naver.com/v1/nid/me

jwt:
  secret: ${JWT_SECRET:JfV/ZoMm8s33sznFmOfhPk4IVZCm6U74iHRIgo/q0kc=}
  access-token-expiry: 3600      # 1시간 (초)
  refresh-token-expiry: 1209600  # 14일 (초)

logging:
  level:
    # 봇이 HTTP 포트에 HTTPS(TLS) 요청을 보낼 때 발생하는 Tomcat 파싱 오류 억제
    org.apache.coyote.http11: WARN
